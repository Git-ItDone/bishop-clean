name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Run test suite
        run: uv run --group dev pytest -q
